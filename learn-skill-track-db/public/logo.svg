<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#4f46e5" flood-opacity="0.4"/>
    </filter>

    <clipPath id="clip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>

  </defs>

  <!-- Background tile -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" filter="url(#sh)"/>

  <!-- Shine top half -->
  <rect width="512" height="260" rx="112" ry="112" fill="url(#shine)" clip-path="url(#clip)"/>

  <!-- Left book page -->
  <path d="M128 162 Q192 150 256 170 L256 355 Q192 338 128 350 Z" fill="#ffffff" opacity="0.15"/>

  <!-- Right book page -->
  <path d="M384 162 Q320 150 256 170 L256 355 Q320 338 384 350 Z" fill="#ffffff" opacity="0.10"/>

  <!-- Book spine -->
  <rect x="249" y="166" width="14" height="192" rx="7" fill="url(#spine)"/>

  <!-- Left page lines -->
  <line x1="150" y1="220" x2="237" y2="213" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.60"/>
  <line x1="150" y1="249" x2="237" y2="244" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.60"/>
  <line x1="150" y1="278" x2="237" y2="274" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
  <line x1="150" y1="307" x2="237" y2="304" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.32"/>

  <!-- Right page lines -->
  <line x1="275" y1="213" x2="362" y2="220" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.60"/>
  <line x1="275" y1="244" x2="362" y2="249" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.60"/>
  <line x1="275" y1="274" x2="362" y2="278" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
  <line x1="275" y1="304" x2="362" y2="307" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.32"/>

  <!-- Progress track -->
  <rect x="106" y="378" width="300" height="18" rx="9" fill="#ffffff" opacity="0.18"/>

  <!-- Progress fill ~66% -->
  <rect x="106" y="378" width="198" height="18" rx="9" fill="url(#bar)"/>

  <!-- Progress dot -->
  <circle cx="304" cy="387" r="13" fill="#34d399"/>
  <circle cx="304" cy="387" r="7" fill="#ffffff"/>

  <!-- LST text -->
  <text
    x="256" y="466"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="8"
    opacity="0.94">LST</text>

</svg>